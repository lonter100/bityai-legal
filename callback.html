<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BityAi — TikTok OAuth</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 3rem auto; padding: 0 1rem; color: #1a1030; }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    p { line-height: 1.6; color: #444; }
    code, .code {
      display: block; margin: 1rem 0; padding: 1rem;
      background: #f4f6fb; border: 1px solid #d8e0f0; border-radius: 8px;
      font-size: 0.9rem; word-break: break-all; user-select: all;
    }
    button {
      background: #fe2c55; color: #fff; border: none; border-radius: 8px;
      padding: 0.65rem 1.2rem; font-size: 1rem; cursor: pointer;
    }
    button:hover { background: #e0264c; }
    .ok { color: #0a7a3e; }
    .err { color: #c00; }
    a { color: #3b6cff; }
  </style>
</head>
<body>
  <h1>BityAi — TikTok authorization</h1>
  <p id="msg">Loading…</p>
  <div id="box" hidden>
    <p>Copy this code and paste it into the server terminal (<code>./run.sh --tiktok-auth</code>):</p>
    <div class="code" id="code"></div>
    <button type="button" id="copy">Copy code</button>
    <p class="ok" id="copied" hidden>Copied to clipboard.</p>
  </div>
  <p><a href="index.html">← Back to BityAi</a></p>
  <script>
    const params = new URLSearchParams(location.search);
    const msg = document.getElementById("msg");
    const box = document.getElementById("box");
    const codeEl = document.getElementById("code");
    const err = params.get("error");
    const code = params.get("code");

    if (err) {
      msg.innerHTML = '<span class="err">Authorization failed: ' + err + '</span>';
      if (params.get("error_description")) {
        msg.innerHTML += "<br>" + params.get("error_description");
      }
    } else if (code) {
      msg.textContent = "Authorization successful.";
      codeEl.textContent = code;
      box.hidden = false;
      document.getElementById("copy").onclick = () => {
        navigator.clipboard.writeText(code).then(() => {
          document.getElementById("copied").hidden = false;
        });
      };
    } else {
      msg.textContent = "No authorization code in this URL. Start OAuth from the BityAi server.";
    }
  </script>
</body>
</html>
